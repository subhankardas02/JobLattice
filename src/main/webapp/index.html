<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>Welcome to Job Lattice</h1>
        <h2>Kindly Register to proceed further!</h2>
        
        <form method="post" action="./main_page">
            <table>
                <tr>
                    <td><label for="uname">User Name</label></td>
                    <td><input type="text" id="uname" name="uname" placeholder="Enter A Unique User Name"></td>
                </tr>
                <tr>
                    <td><label for="email">Email Id</label></td>
                    <td><input type="email" id="email" name="email" placeholder="Enter Your Email"></td>
                </tr>
                <tr>
                    <td><label for="password">Password</label></td>
                    <td><input type="password" id="password" name="password" placeholder="Enter Your Password"></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Sign Up" class="btn-submit">
                    </td>
                </tr>
            </table>
        </form>
        
        <div class="login-redirect">
            <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
        
    </div>

</body>
</html>
